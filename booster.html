<!DOCTYPE html>
<html lang="zh-TW" data-theme="cupcake">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>錯字自我增進考場</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .success-anim { animation: pop 0.3s ease-in-out; background-color: oklch(var(--su) / 0.2) !important; border-color: oklch(var(--su)) !important; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .error-anim { animation: shake 0.4s ease-in-out; background-color: oklch(var(--er) / 0.2) !important; border-color: oklch(var(--er)) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body class="bg-base-200 min-h-screen p-4 md:p-8 flex flex-col items-center">

    <div class="max-w-2xl w-full space-y-6">
        
        <div class="navbar bg-base-100 rounded-box shadow-sm px-6 flex justify-between">
            <div class="flex items-center gap-2">
                <a href="index.html" class="btn btn-sm btn-ghost hover:bg-base-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                    回首頁
                </a>
            </div>
            <div id="user-status" class="text-sm">
                <span id="display-email" class="mr-2 text-gray-500 font-bold">載入中...</span>
            </div>
        </div>

        <div id="empty-panel" class="card bg-base-100 shadow-xl p-8 text-center hidden">
            <div class="text-5xl mb-3">🎉</div>
            <h2 class="text-2xl font-bold mb-2">目前沒有任何常錯字紀錄</h2>
            <p class="text-gray-400 text-sm mb-6">太厲害了！你對這個單元的掌握度極高，不需要進行自我增進特訓。</p>
            <a href="index.html" class="btn btn-primary btn-sm mx-auto max-w-xs">回特訓控制台</a>
        </div>

        <div id="game-panel" class="card bg-base-100 shadow-xl hidden">
            <div class="card-body items-center text-center relative">
                
                <h2 id="booster-title" class="text-2xl font-bold text-error mb-2">🚀 自我增進：地獄盲測特訓</h2>
                <p class="text-sm text-gray-500 mb-4">增進難度：前三名考3次、4-6名考2次、其餘1次。必須全對才能計入通關次數！</p>

                <div class="w-full mb-6">
                    <div class="flex justify-between text-sm mb-1 font-bold">
                        <span>特訓進行度</span>
                        <span id="progress-text" class="text-error">0 / 0</span>
                    </div>
                    <progress id="progress-bar" class="progress progress-error w-full" value="0" max="100"></progress>
                    <p id="cloud-sync-status" class="text-xs text-gray-400 mt-2 text-right">常錯字已完成加權權重 ✓</p>
                </div>

                <div id="kana-card" class="card bg-base-200 border-2 border-base-300 w-64 h-64 flex flex-col items-center justify-center shadow-inner transition-all">
                    <h2 id="current-kana" class="text-8xl font-bold select-none">あ</h2>
                </div>

                <div class="form-control w-full max-w-xs mt-8">
                    <input type="text" id="romaji-input" autocomplete="off" placeholder="輸入拼音..." class="input input-bordered input-lg w-full text-center text-2xl" />
                </div>

                <button id="btn-skip" class="btn btn-outline btn-warning w-full max-w-xs mt-4">不知道，跳過</button>

            </div>
        </div>

        <div id="complete-panel" class="card bg-base-100 shadow-xl hidden">
            <div class="card-body items-center text-center py-12">
                <div class="text-6xl mb-4">🏆</div>
                <h2 class="text-3xl font-bold text-success mb-2">自我增進完美突破！</h2>
                <p class="text-gray-500 mb-8">你已經成功用意志力將高度不熟的常錯字全部擊碎！</p>
                <p class="text-sm text-gray-400 mb-6 font-bold">🏆 當前模式增進通關次數已累加！</p>
                <a href="index.html" class="btn btn-success text-white">回首頁看新紀錄</a>
            </div>
        </div>

        <div id="failed-panel" class="card bg-base-100 shadow-xl hidden border-2 border-error">
            <div class="card-body items-center text-center py-12">
                <div class="text-6xl mb-4">💀</div>
                <h2 class="text-3xl font-bold text-error mb-2">特訓未達完美...</h2>
                <p class="text-gray-500 mb-8">可惜在測驗中出現了錯誤，因此本次特訓<strong class="text-error">不予計入通關次數</strong>！<br>錯字已再度加重權重，請調整呼吸重新挑戰！</p>
                <a href="index.html" class="btn btn-error text-white">回首頁看常錯名單</a>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, increment } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        // ==========================================
        // ⚠️ 這裡請填入你自己的金鑰！
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAMRlVXZ9sGxBCX6V9Nc2nz942JxD01WIs",
            authDomain: "japanese-f3239.firebaseapp.com",
            projectId: "japanese-f3239",
            storageBucket: "japanese-f3239.firebasestorage.app",
            messagingSenderId: "201568474978",
            appId: "1:201568474978:web:3b406e78b4561c78a0fe3b",
            measurementId: "G-9BYMSD88D9"
        };
        // ==========================================

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 完全校對版 107 音總資料庫
        const gojuonData = [
            { kana: 'あ', romaji: 'a' }, { kana: 'い', romaji: 'i' }, { kana: 'う', romaji: 'u' }, { kana: 'え', romaji: 'e' }, { kana: 'お', romaji: 'o' },
            { kana: 'か', romaji: 'ka' }, { kana: 'き', romaji: 'ki' }, { kana: 'く', romaji: 'ku' }, { kana: 'け', romaji: 'ke' }, { kana: 'こ', romaji: 'ko' },
            { kana: 'さ', romaji: 'sa' }, { kana: 'し', romaji: 'shi' }, { kana: 'す', romaji: 'su' }, { kana: 'せ', romaji: 'se' }, { kana: 'そ', romaji: 'so' },
            { kana: 'た', romaji: 'ta' }, { kana: 'ち', romaji: 'chi' }, { kana: 'つ', romaji: 'tsu' }, { kana: 'て', romaji: 'te' }, { kana: 'と', romaji: 'to' },
            { kana: 'な', romaji: 'na' }, { kana: 'に', romaji: 'ni' }, { kana: 'ぬ', romaji: 'nu' }, { kana: 'ね', romaji: 'ne' }, { kana: 'の', romaji: 'no' },
            { kana: 'は', romaji: 'ha' }, { kana: 'ひ', romaji: 'hi' }, { kana: 'ふ', romaji: 'fu' }, { kana: 'へ', romaji: 'he' }, { kana: 'ほ', romaji: 'ho' },
            { kana: 'ま', romaji: 'ma' }, { kana: 'み', romaji: 'mi' }, { kana: 'む', romaji: 'mu' }, { kana: 'め', romaji: 'me' }, { kana: 'も', romaji: 'mo' },
            { kana: 'や', romaji: 'ya' }, { kana: 'ゆ', romaji: 'yu' }, { kana: 'よ', romaji: 'yo' },
            { kana: 'ら', romaji: 'ra' }, { kana: 'り', romaji: 'ri' }, { kana: 'る', romaji: 'ru' }, { kana: 'れ', romaji: 're' }, { kana: 'ろ', romaji: 'ro' },
            { kana: 'わ', romaji: 'wa' }, { kana: 'を', romaji: 'wo' }, { kana: 'ん', romaji: 'n' }
        ];
        const dakuonData = [
            { kana: 'が', romaji: 'ga' }, { kana: 'ぎ', romaji: 'gi' }, { kana: 'ぐ', romaji: 'gu' }, { kana: 'げ', romaji: 'ge' }, { kana: 'ご', romaji: 'go' },
            { kana: 'ざ', romaji: 'za' }, { kana: 'じ', romaji: 'ji' }, { kana: 'ず', romaji: 'zu' }, { kana: 'ぜ', romaji: 'ze' }, { kana: 'ぞ', romaji: 'zo' },
            { kana: 'だ', romaji: 'da' }, { kana: 'ぢ', romaji: 'di' }, { kana: 'づ', romaji: 'du' }, { kana: 'で', romaji: 'de' }, { kana: 'ど', romaji: 'do' },
            { kana: 'ば', romaji: 'ba' }, { kana: 'び', romaji: 'bi' }, { kana: 'ぶ', romaji: 'bu' }, { kana: 'べ', romaji: 'be' }, { kana: 'ぼ', romaji: 'bo' },
            { kana: 'ぱ', romaji: 'pa' }, { kana: 'ぴ', romaji: 'pi' }, { kana: 'ぷ', romaji: 'pu' }, { kana: 'ぺ', romaji: 'pe' }, { kana: 'ぽ', romaji: 'po' }
        ];
        const youonData = [
            { kana: 'きゃ', romaji: 'kya' }, { kana: 'きゅ', romaji: 'kyu' }, { kana: 'きょ', romaji: 'kyo' },
            { kana: 'しゃ', romaji: 'sya' }, { kana: 'しゅ', romaji: 'syu' }, { kana: 'しょ', romaji: 'syo' },
            { kana: 'ちゃ', romaji: 'cha' }, { kana: 'ちゅ', romaji: 'chu' }, { kana: 'ちょ', romaji: 'cho' },
            { kana: 'にゃ', romaji: 'nya' }, { kana: 'にゅ', romaji: 'nyu' }, { kana: 'にょ', romaji: 'nyo' },
            { kana: 'ひゃ', romaji: 'hya' }, { kana: 'ひゅ', romaji: 'hyu' }, { kana: 'ひょ', romaji: 'hyo' },
            { kana: 'みゃ', romaji: 'mya' }, { kana: 'みゅ', romaji: 'myu' }, { kana: 'みょ', romaji: 'myo' },
            { kana: 'りゃ', romaji: 'rya' }, { kana: 'りゅ', romaji: 'ryu' }, { kana: 'りょ', romaji: 'ryo' },
            { kana: 'ぎゃ', romaji: 'gya' }, { kana: 'ぎゅ', romaji: 'gyu' }, { kana: 'ぎょ', romaji: 'gyo' },
            { kana: 'じゃ', romaji: 'ja' },  { kana: 'じゅ', romaji: 'ju' },  { kana: 'じょ', romaji: 'jo' },
            { kana: 'ぢゃ', romaji: 'dya' }, { kana: 'ぢゅ', romaji: 'dyu' }, { kana: 'ぢょ', romaji: 'dyo' },
            { kana: 'びゃ', romaji: 'bya' }, { kana: 'びゅ', romaji: 'byu' }, { kana: 'びょ', romaji: 'byo' },
            { kana: 'ぴゃ', romaji: 'pya' }, { kana: 'ぴゅ', romaji: 'pyu' }, { kana: 'ぴょ', romaji: 'pyo' }
        ];
        const allKanaData = [...gojuonData, ...dakuonData, ...youonData];

        // 讀取網址參數 (?mode=gojuon / dakuon / youon)
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || 'gojuon';

        let currentTarget = null;
        let boosterQueue = []; // 配比展開後的最終題庫
        let boosterCounts = {};
        let totalNeeded = 0;
        let currentDone = 0;
        let currentRunFailed = false;

        // 依據 mode 決定資料庫欄位名稱
        const modeConfig = {
            'gojuon': { dbField: 'examMistakes', clearField: 'gojuonBoosterClears', title: '🚀 清音自我增進盲測', themeClass: 'text-error' },
            'dakuon': { dbField: 'dakuonExamMistakes', clearField: 'dakuonBoosterClears', title: '🚀 濁音自我增進盲測', themeClass: 'text-secondary' },
            'youon': { dbField: 'youonExamMistakes', clearField: 'youonBoosterClears', title: '🚀 拗音自我增進盲測', themeClass: 'text-success' }
        };
        const currentConfig = modeConfig[mode];

        const DOM = {
            gamePanel: document.getElementById('game-panel'),
            emptyPanel: document.getElementById('empty-panel'),
            completePanel: document.getElementById('complete-panel'),
            failedPanel: document.getElementById('failed-panel'),
            displayEmail: document.getElementById('display-email'),
            boosterTitle: document.getElementById('booster-title'),
            progressBar: document.getElementById('progress-bar'),
            progressText: document.getElementById('progress-text'),
            kanaCard: document.getElementById('kana-card'),
            currentKana: document.getElementById('current-kana'),
            romajiInput: document.getElementById('romaji-input'),
            btnSkip: document.getElementById('btn-skip')
        };

        // 修改主題色與標題
        DOM.boosterTitle.textContent = currentConfig.title;
        DOM.boosterTitle.className = `text-2xl font-bold mb-2 ${currentConfig.themeClass}`;
        DOM.progressBar.className = `progress w-full progress-${mode === 'gojuon'?'error':(mode==='dakuon'?'secondary':'success')}`;
        document.getElementById('progress-text').className = currentConfig.themeClass;

        // --- 本地狀態儲存 (增進特訓版) ---
        function saveLocalState(uid) {
            const state = { boosterCounts, totalNeeded, currentDone, currentRunFailed, boosterQueue };
            localStorage.setItem(`exam_state_booster_${mode}_${uid}`, JSON.stringify(state));
        }

        function clearLocalState(uid) {
            localStorage.removeItem(`exam_state_booster_${mode}_${uid}`);
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                DOM.displayEmail.textContent = user.email;
                await initBoosterGame(user.uid);
            } else {
                window.location.href = 'index.html';
            }
        });

        async function initBoosterGame(uid) {
            // 先看有沒有殘留的中斷存檔
            const savedStr = localStorage.getItem(`exam_state_booster_${mode}_${uid}`);
            if (savedStr) {
                const state = JSON.parse(savedStr);
                boosterCounts = state.boosterCounts;
                totalNeeded = state.totalNeeded;
                currentDone = state.currentDone;
                currentRunFailed = state.currentRunFailed;
                boosterQueue = state.boosterQueue;
                
                DOM.gamePanel.classList.remove('hidden');
                nextQuestion(uid);
                return;
            }

            // 否則，從雲端拉取排行榜字典
            try {
                const docSnap = await getDoc(doc(db, "users_progress", uid));
                let mistakesDict = {};
                if (docSnap.exists() && docSnap.data()[currentConfig.dbField]) {
                    mistakesDict = docSnap.data()[currentConfig.dbField];
                }

                // 轉成 Array 並依「錯誤次數由高到低」排序
                const entries = Object.entries(mistakesDict).sort((a, b) => b[1] - a[1]);

                if (entries.length === 0) {
                    DOM.emptyPanel.classList.remove('hidden');
                    return;
                }

                boosterCounts = {};
                totalNeeded = 0;
                currentDone = 0;
                currentRunFailed = false;
                boosterQueue = [];

                // 核心邏輯：1-3名考3次、4-6名考2次、其餘1次
                entries.forEach(([key, count], index) => {
                    // 反查 kana 與 romaji 結構
                    const matched = allKanaData.find(k => k.romaji === key || k.kana === key);
                    if (!matched) return;

                    let neededCount = 1;
                    if (index < 3) neededCount = 3;
                    else if (index < 6) neededCount = 2;

                    boosterCounts[matched.kana] = neededCount;
                    totalNeeded += neededCount;
                    
                    // 把題目以對應的次數塞進佇列，稍後直接打亂
                    for(let i=0; i<neededCount; i++) {
                        boosterQueue.push(matched);
                    }
                });

                // 打亂佇列
                boosterQueue = boosterQueue.sort(() => Math.random() - 0.5);

                DOM.gamePanel.classList.remove('hidden');
                nextQuestion(uid);

            } catch (err) { console.error(err); }
        }

        function nextQuestion(uid) {
            DOM.progressBar.max = totalNeeded;
            DOM.progressBar.value = currentDone;
            DOM.progressText.textContent = `${currentDone} / ${totalNeeded}`;

            // 當題目完全考完時，進行結算
            if (boosterQueue.length === 0) {
                DOM.gamePanel.classList.add('hidden');
                if (currentRunFailed) {
                    // 曾有答錯，顯示失敗畫面 (不予計入通關)
                    DOM.failedPanel.classList.remove('hidden');
                } else {
                    // 完美通關：加計增進通關次數
                    recordClearCount(uid);
                    DOM.completePanel.classList.remove('hidden');
                }
                clearLocalState(uid);
                return;
            }

            currentTarget = boosterQueue.pop();
            saveLocalState(uid); // 抽題完成立刻存本地

            DOM.currentKana.textContent = currentTarget.kana;
            DOM.romajiInput.value = '';
            DOM.romajiInput.focus();
        }

        async function recordClearCount(uid) {
            try {
                await setDoc(doc(db, "users_progress", uid), {
                    [currentConfig.clearField]: increment(1)
                }, { merge: true });
            } catch (err) { console.error(err); }
        }

        function handleCorrect() {
            DOM.kanaCard.classList.add('success-anim');
            setTimeout(() => DOM.kanaCard.classList.remove('success-anim'), 300);

            currentDone++; // 只增加進度
            const uid = auth.currentUser.uid;
            setTimeout(() => nextQuestion(uid), 200);
        }

        async function handleWrong() {
            DOM.kanaCard.classList.add('error-anim');
            setTimeout(() => DOM.kanaCard.classList.remove('error-anim'), 300);

            currentRunFailed = true; // 標記本次挑戰失敗，但不會中斷測驗

            const uid = auth.currentUser.uid;
            
            // 寫回原本的常錯字排行榜（使其權重更重）
            try {
                let keyField = (mode === 'gojuon') ? currentTarget.romaji : currentTarget.kana;
                await setDoc(doc(db, "users_progress", uid), {
                    [currentConfig.dbField]: { [keyField]: increment(1) }
                }, { merge: true });
            } catch(e){}

            // 💡 關鍵修正：把佇列中「與這題相同的剩餘字元」全數過濾掉，不再重複詢問
            let originalLength = boosterQueue.length;
            boosterQueue = boosterQueue.filter(item => item.kana !== currentTarget.kana);
            let removedCount = originalLength - boosterQueue.length;

            // 進度條直接加上：當前錯的這 1 次 + 被刪掉的分身次數
            currentDone += (1 + removedCount); 
            
            setTimeout(() => nextQuestion(uid), 300);
        }

        DOM.romajiInput.addEventListener('input', (e) => {
            const val = e.target.value.trim().toLowerCase();
            if (currentTarget && val === currentTarget.romaji) {
                handleCorrect();
            }
        });

        DOM.romajiInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = e.target.value.trim().toLowerCase();
                if (val !== currentTarget.romaji) {
                    handleWrong();
                }
            }
        });

        DOM.btnSkip.addEventListener('click', () => {
            if (currentTarget) handleWrong();
        });

    </script>
</body>
</html>
